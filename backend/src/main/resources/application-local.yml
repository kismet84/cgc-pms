spring:
  main:
    allow-circular-references: true
    lazy-initialization: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cgcpms_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    hikari:
      pool-name: CgcPmsTestHikariPool
      maximum-pool-size: 5

  # Disable Redis (not running locally)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # Flyway using H2-compatible migrations
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    encoding: UTF-8
    validate-on-migrate: false

  # Disable spring.sql.init — Flyway handles all schema and data
  sql:
    init:
      mode: never

# Disable MinIO (only available via Docker Compose)
minio:
  enabled: false

# JWT
jwt:
  secret: ${JWT_SECRET:local-dev-only-change-me-cgc-pms-jwt-secret-key-256bit-minimum-length}
  expiration: 86400000
  refresh-expiration: 604800000
  header: Authorization
  token-prefix: "Bearer "

cors:
  allowed-origins: "http://localhost:5173"

logging:
  level:
    com.cgcpms: DEBUG
    org.springframework.security: DEBUG
