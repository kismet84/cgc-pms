spring:
  main:
    # NOTE: allow-circular-references is intentionally NOT set here.
    # Circular dependencies must be fixed in production code.
    # Test classes that need it use @SpringBootTest(properties="...") individually.
    lazy-initialization: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cgcpms_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    hikari:
      pool-name: CgcPmsTestHikariPool
      maximum-pool-size: 5

  # Disable Redis (not running locally)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # Flyway using H2-compatible migrations
  flyway:
    enabled: true
    locations: classpath:db/migration-h2,classpath:com/cgcpms/common/migration,classpath:com/cgcpms/common/migration/**/*.class
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    encoding: UTF-8
    validate-on-migrate: false
    # clean-disabled=false is safe for H2 in-memory — DB is recreated each run.
    clean-disabled: false

  # Disable spring.sql.init — Flyway handles all schema and data
  sql:
    init:
      mode: never

# Disable MinIO (only available via Docker Compose)
minio:
  enabled: false

# JWT
jwt:
  # Plaintext secret for local H2 development — no Jasypt dependency needed.
  # Override via TEST_JWT_SECRET env var in CI if needed.
  secret: ${TEST_JWT_SECRET:local-dev-only-cgc-pms-jwt-secret-key-256bit-minimum-length}
  # 1 h — developer convenience for local debugging
  expiration: 3600000
  refresh-expiration: 604800000
  header: Authorization
  token-prefix: "Bearer "

cors:
  allowed-origins: "http://localhost:5173"

logging:
  level:
    com.cgcpms: DEBUG
    org.springframework.security: DEBUG
