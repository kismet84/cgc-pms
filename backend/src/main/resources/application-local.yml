spring:
  security:
    user:
      name: local
      password: ${SPRING_SECURITY_USER_PASSWORD:local-only-not-used-by-jwt}
  main:
    # NOTE: allow-circular-references is intentionally NOT set here.
    # Circular dependencies must be fixed in production code.
    # Test classes that need it use @SpringBootTest(properties="...") individually.
    lazy-initialization: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cgcpms_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;LOCK_TIMEOUT=300000
    username: sa
    password:
    hikari:
      pool-name: CgcPmsTestHikariPool
      maximum-pool-size: 20
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
      minimum-idle: 5

  # Disable Redis (not running locally)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # Flyway using H2-compatible migrations
  flyway:
    enabled: true
    locations: classpath:db/migration-h2,classpath:com/cgcpms/common/migration,classpath:com/cgcpms/common/migration/**/*.class
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    encoding: UTF-8
    validate-on-migrate: true
    # clean-disabled=false is safe for H2 in-memory — DB is recreated each run.
    clean-disabled: false

  # Disable spring.sql.init — Flyway handles all schema and data
  sql:
    init:
      mode: never

# Disable MinIO (only available via Docker Compose)
minio:
  enabled: false

virus-scan:
  enabled: false

# JWT
jwt:
  # Must be provided explicitly for local/CI test runs.
  secret: ${TEST_JWT_SECRET}
  # 1 h — developer convenience for local debugging
  expiration: 3600000
  refresh-expiration: 604800000
  header: Authorization
  token-prefix: "Bearer "

cors:
  allowed-origins: "http://localhost:5173"

logging:
  level:
    com.cgcpms: DEBUG
    org.springframework.security: DEBUG

auth:
  token-blacklist:
    enabled: false
  dev-login:
    enabled: true
    default-username: demo_dev_super_admin

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE:health,info,metrics}
