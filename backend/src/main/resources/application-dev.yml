spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/cgc_pms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:cgc}
    password: ${DB_PASSWORD:ENC(8TK7iL5rMvapLXkoMQ7rm8ngWpm8Pryn2/y9T0fv7sIraCAw9iiBJFICgqzEhSyE)}
    hikari:
      pool-name: CgcPmsHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-init-sql: SET NAMES utf8mb4

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

  # Flyway database migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    encoding: UTF-8
    validate-on-migrate: false

# MinIO object storage
minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:ENC(93qmaOL3j0Sfw0u0Juj/Iwvrv2a2waPK4Fnk6F37XWeBzNTdk7RerukazbN0G1a+)}
  secret-key: ${MINIO_SECRET_KEY:ENC(TpgnxaWPMxXdj8dlhB1QEiua+tAJUbLUWzD44JKKUXWW32TpIxTolhj1rYGoMc2+)}
  bucket: cgc-pms

# JWT
jwt:
  secret: ${JWT_SECRET:ENC(f8QazJP/qwoDWYnXe/Zl5yprkh2AwHISG0dPVPgD1cZZ+5IUNVcwwCnG/lH8mMotDMCakCmtvvMd63v8RjUvEq0iX2ZaZGCO9GDK69wzRi8bGldeu3RCD6wLCwjj5bRw)}
  # 15 min — production-grade access token lifetime
  expiration: 900000
  refresh-expiration: 604800000
  header: Authorization
  token-prefix: "Bearer "

# Actuator — 仅暴露 health 和 info（非 prod 默认全开的安全加固）
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}

cors:
  allowed-origins: "http://localhost:5173"
