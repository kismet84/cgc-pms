spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/cgc_pms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:cgc}
    password: ${DB_PASSWORD:__SET_DB_PASSWORD_IN_ENV__}
    hikari:
      pool-name: CgcPmsHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME:1740000}
      connection-timeout: 30000
      connection-init-sql: SET NAMES utf8mb4

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

  # Flyway database migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    encoding: UTF-8
    validate-on-migrate: false

# MinIO object storage
minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:__SET_MINIO_ACCESS_KEY_IN_ENV__}
  secret-key: ${MINIO_SECRET_KEY:__SET_MINIO_SECRET_KEY_IN_ENV__}
  bucket: cgc-pms

# JWT
jwt:
  secret: ${JWT_SECRET:__SET_JWT_SECRET_IN_ENV__}
  # 15 min — production-grade access token lifetime
  expiration: 900000
  refresh-expiration: 604800000
  header: Authorization
  token-prefix: "Bearer "

# Actuator — 仅暴露 health 和 info（非 prod 默认全开的安全加固）
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}

cors:
  allowed-origins: "http://localhost:5173"

auth:
  dev-login:
    enabled: true
    default-username: demo_dev_super_admin
