spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cgc_pms_test?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:cgc}
    password: ${DB_PASSWORD:cgc123}
    hikari:
      pool-name: CgcPmsHikariPool
      minimum-idle: 2
      maximum-pool-size: 10

  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 5000ms

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true

minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket: cgc-pms-test

jwt:
  secret: ${JWT_SECRET:test-only-change-me-cgc-pms-jwt-secret-key-256bit-minimum-length}
  expiration: 86400000
  refresh-expiration: 604800000
  header: Authorization
  token-prefix: "Bearer "

cors:
  allowed-origins: "http://localhost:5173"

logging:
  level:
    root: INFO
    com.cgcpms: DEBUG
