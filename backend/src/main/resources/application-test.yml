spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cgc_pms_test?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: cgc
    password: cgc123
    hikari:
      pool-name: CgcPmsHikariPool
      minimum-idle: 2
      maximum-pool-size: 10

  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 5000ms

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true

