  bucket: cgc-pms-test

jwt:
  secret: test-only-change-me-cgc-pms-jwt-secret-key-256bit-minimum-length
  expiration: 86400000
  header: Authorization
  token-prefix: "Bearer "

logging:
  level:
    root: INFO
    com.cgcpms: DEBUG
