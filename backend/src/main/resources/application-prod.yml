spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/cgc_pms?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true&verifyServerCertificate=true&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: CgcPmsHikariPool
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME:1740000}
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
  region: ${MINIO_REGION:us-east-1}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:cgc-pms}

virus-scan:
  enabled: ${VIRUS_SCAN_ENABLED:true}
  host: ${VIRUS_SCAN_HOST}
  port: ${VIRUS_SCAN_PORT:3310}
  connect-timeout-millis: ${VIRUS_SCAN_CONNECT_TIMEOUT_MILLIS:2000}
  read-timeout-millis: ${VIRUS_SCAN_READ_TIMEOUT_MILLIS:30000}

# Cookie security — enable Secure flag for HTTPS-only environments
cookie:
  secure: true

jwt:
  secret: ${JWT_SECRET}
  # 15 min — production-grade access token lifetime (override via JWT_EXPIRATION env)
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  header: Authorization
  token-prefix: "Bearer "

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-production-domain.com}

auth:
  dev-login:
    enabled: false

# Actuator health checks
# DB (DataSourceHealthIndicator) and Redis (RedisHealthIndicator) are auto-configured by default
# when the respective dependencies are on the classpath.
# MinIO health requires a custom HealthIndicator bean — add if needed.
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
      show-components: ${MANAGEMENT_HEALTH_SHOW_COMPONENTS:never}
      probes:
        enabled: ${MANAGEMENT_HEALTH_PROBES_ENABLED:true}

logging:
  level:
    root: WARN
    com.cgcpms: INFO
