server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: cgc-pms-backend
  profiles:
    active: dev

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: deletedFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cgcpms.**.entity

# SpringDoc OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.cgcpms: INFO

app:
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 200
    thread-name-prefix: cgc-pms-async-

rate-limit:
  global-write:
    enabled: true
    max-requests: 120
    window-seconds: 60

# Business document generation stays off until tenant-scoped dev/test canary approval.
document:
  generation:
    enabled: ${DOCUMENT_GENERATION_ENABLED:false}
    payment-enabled: ${DOCUMENT_PAYMENT_GENERATION_ENABLED:false}
    settlement-enabled: ${DOCUMENT_SETTLEMENT_GENERATION_ENABLED:false}
    max-template-bytes: ${DOCUMENT_MAX_TEMPLATE_BYTES:524288}
    max-collection-items: ${DOCUMENT_MAX_COLLECTION_ITEMS:200}
    max-image-bytes: ${DOCUMENT_MAX_IMAGE_BYTES:1048576}
    max-total-image-bytes: ${DOCUMENT_MAX_TOTAL_IMAGE_BYTES:3145728}
    max-pdf-bytes: ${DOCUMENT_MAX_PDF_BYTES:20971520}
    max-pages: ${DOCUMENT_MAX_PAGES:100}
    timeout-seconds: ${DOCUMENT_RENDER_TIMEOUT_SECONDS:15}
    concurrency: ${DOCUMENT_RENDER_CONCURRENCY:2}
    queue-capacity: ${DOCUMENT_RENDER_QUEUE_CAPACITY:2}

resilience4j:
  circuitbreaker:
    instances:
      minio:
        sliding-window-type: count_based
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      minio:
        timeout-duration: 10s
