# ⚠️ 此 profile 连接宿主机 localhost:3306 的 MySQL。
#   确保 MySQL 已运行，且 cgc_pms 库的 Flyway migration 与当前版本一致。
#   本地开发建议使用 @ActiveProfiles("local") → H2 内存库，无需外部依赖。
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cgc_pms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:cgc}
    # Override TEST_DB_PASSWORD in CI environment
    password: ${TEST_DB_PASSWORD:cgc123}
    hikari:
      pool-name: CgcPmsHikariPool
      minimum-idle: 2
      maximum-pool-size: 10
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

minio:
  enabled: false

jwt:
  # Override TEST_JWT_SECRET in CI environment
  secret: ${TEST_JWT_SECRET:test-only-change-me-cgc-pms-jwt-secret-key-256bit-minimum-length}
  # 15 min — unified with production for consistent test behavior
  expiration: 900000
  refresh-expiration: 604800000

cors:
  allowed-origins: "http://localhost:5173"

logging:
  level:
    root: WARN
    com.cgcpms: INFO
