# ⚠️ 此文件覆盖 main/resources/application.yml 的全局默认值（classpath 优先级更高）。
#   仅包含测试环境需要的覆盖项，其余配置继承 main 版本。
spring:
  security:
    user:
      name: test
      password: test-only-not-used-by-jwt
  main:
    allow-circular-references: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  flyway:
    enabled: true
    # General regression tests intentionally retain the frozen legacy fixture chain.
    # Fresh B215/H2 and B215/MySQL behavior is covered by dedicated baseline tests;
    # including B215 here would suppress the historical demo fixtures many existing
    # service/controller tests explicitly exercise.
    locations: classpath:db/migration-h2-legacy,classpath:com/cgcpms/common/migration,classpath:com/cgcpms/common/migration/**/*.class
  sql:
    init:
      mode: never

# MyBatis-Plus — 继承 main application.yml 的逻辑删除等配置，此处仅声明 mapper 路径
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deletedFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

minio:
  enabled: false

auth:
  csrf:
    enabled: false

# Unrelated integration tests share a cached Spring context and the in-memory
# fallback counter store. Keep global write throttling off by default in the
# test classpath; GlobalWriteRateLimitFilterTest enables it explicitly.
rate-limit:
  global-write:
    enabled: false

logging:
  level:
    root: WARN
    com.cgcpms: INFO
