spring:
  main:
    allow-circular-references: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  flyway:
    enabled: true
  sql:
    init:
      mode: never

minio:
  enabled: false

logging:
  level:
    root: WARN
    com.cgcpms: INFO
