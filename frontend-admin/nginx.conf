# =============================================================================
# CGC-PMS Frontend Nginx Configuration (Production)
# =============================================================================
# Self-signed certificate generation (for local/dev testing only):
#   cd deploy && mkdir -p ssl
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout ssl/server.key -out ssl/server.crt \
#     -subj "/CN=your-domain.com"
#
# Production: replace with CA-signed certificates (Let's Encrypt, etc.)
# =============================================================================

# ---------------------------------------------------------------------------
# Gzip compression
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/x-javascript
    image/svg+xml
    font/woff2;

# ---------------------------------------------------------------------------
# HTTP server
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ---- SSL certificate ----
    # For DEV: generate self-signed cert as documented above
    # For PROD: mount CA-signed certs via Docker volume
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # ---- SSL protocols & ciphers (Mozilla intermediate, modern) ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; form-action 'self';" always;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Root & SPA fallback ----
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets with hashed filenames (immutable, 1 year)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: all non-file, non-/api routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent index.html caching (always fetch latest SPA shell)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ---- API reverse proxy to backend ----
    # Backend service name/URL configurable via BACKEND_URL env var (default: backend:8080 for Docker Compose)
    location /api/ {
        proxy_pass http://${BACKEND_URL}/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (SSE requires long-lived connections for real-time notifications)
        proxy_connect_timeout 10s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;

        # Buffering disabled for SSE (real-time notifications)
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;

        # Disable client-side caching for API responses
        add_header Cache-Control "no-store";
    }

    # ---- SSE real-time notifications (must disable buffering) ----
    location /api/notifications/stream {
        proxy_pass http://${BACKEND_URL}/api/notifications/stream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;

        # Disable client-side caching
        add_header Cache-Control "no-store";
        add_header X-Accel-Buffering "no";
    }

    # ---- Deny hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
