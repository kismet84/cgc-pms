# =============================================================================
# CGC-PMS Frontend Nginx Configuration
# =============================================================================
# Self-signed certificate generation (for local/dev testing only):
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/server.key \
#     -out /etc/nginx/ssl/server.crt \
#     -subj "/CN=localhost"
#
# Production: replace with CA-signed certificates (Let's Encrypt, etc.)
# =============================================================================

# ---------------------------------------------------------------------------
# Gzip compression
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/x-javascript
    image/svg+xml
    font/woff2;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ---- SSL certificate ----
    # For DEV: generate self-signed cert as documented above
    # For PROD: mount CA-signed certs via Docker volume or k8s secret
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # ---- SSL protocols & ciphers (Mozilla intermediate, modern) ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security headers ----
    # HSTS: enforce HTTPS for 1 year
    # COMMENT OUT when using self-signed dev certificates
    add_header Strict-Transport-Security "max-age=31536000" always;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Root & SPA fallback ----
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets with hashed filenames (immutable, 1 year)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: all non-file, non-/api routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent index.html caching (always fetch latest SPA shell)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ---- API reverse proxy to backend ----
    # Backend service name in Docker Compose: "backend", port 8080
    # context-path: /api (set in application.yml server.servlet.context-path)
    location /api/ {
        proxy_pass http://backend:8080/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;

        # Disable client-side caching for API responses
        add_header Cache-Control "no-store";
    }

    # ---- Actuator health (internal monitoring only) ----
    # Uncomment the allow/deny rules to restrict to internal networks:
    # location /actuator/ {
    #     allow 10.0.0.0/8;
    #     allow 172.16.0.0/12;
    #     allow 192.168.0.0/16;
    #     deny all;
    # }

    # ---- Deny hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
