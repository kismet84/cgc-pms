# =============================================================================
# CGC-PMS Docker Compose — Prometheus monitoring stack
# =============================================================================
# Usage:
#   docker compose -f docker-compose.monitoring.yml up -d
#
# Prerequisites:
#   Backend must be running (docker-compose.dev.yml up -d)
# =============================================================================

services:
  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: cgc-pms-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - cgc-pms-dev-net

volumes:
  prometheus-data:

networks:
  cgc-pms-dev-net:
    external: true
    name: deploy_cgc-pms-dev-net
