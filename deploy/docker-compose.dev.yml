# =============================================================================
# CGC-PMS Docker Compose — Development (with source bind mounts + hot reload)
# =============================================================================
# Usage:
#   cd deploy
#   docker compose -f docker-compose.dev.yml up -d
#
# Infrastructure (MySQL, Redis, MinIO) runs in Docker.
# Backend + Frontend source is bind-mounted from host — no rebuild needed.
# Backend:  Java -jar from pre-built JAR (build on host first)
# Frontend: Vite HMR (hot module replacement) on file save
# =============================================================================

services:
  # ===========================================================================
  # MySQL 8.0
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: cgc-pms-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cgc_pms}
      MYSQL_USER: ${MYSQL_USER:-cgc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cgc-pms-dev-net

  # ===========================================================================
  # Redis 7
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: cgc-pms-redis-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-dev-data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cgc-pms-dev-net

  # ===========================================================================
  # MinIO
  # ===========================================================================
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: cgc-pms-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-dev-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cgc-pms-dev-net

  # ===========================================================================
  # ClamAV malware scanner — uploads fail closed when this service is unavailable
  # ===========================================================================
  clamav:
    image: clamav/clamav:1.4.3_base
    container_name: cgc-pms-clamav-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - cgc-pms-dev-net

  # ===========================================================================
  # Backend — Spring Boot from pre-built JAR (bind mount source)
  # ===========================================================================
  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: cgc-pms-backend-dev
    restart: unless-stopped
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      # Bind-mount source code — build JAR on host first: cd backend && ./mvnw clean package -DskipTests
      - ../backend:/app
      # Anonymous volume to keep Linux Maven cache (avoids re-download)
      - maven-repo:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Override dev profile's localhost → Docker service names
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/cgc_pms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_HIKARI_CONNECTION-INIT-SQL: SET NAMES utf8mb4
      DB_USERNAME: ${MYSQL_USER:-cgc}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Document generation canary switches. Defaults remain fail-closed.
      DOCUMENT_GENERATION_ENABLED: "${DOCUMENT_GENERATION_ENABLED:-false}"
      DOCUMENT_PAYMENT_GENERATION_ENABLED: "${DOCUMENT_PAYMENT_GENERATION_ENABLED:-false}"
      DOCUMENT_SETTLEMENT_GENERATION_ENABLED: "${DOCUMENT_SETTLEMENT_GENERATION_ENABLED:-false}"
      MINIO_ENDPOINT: "http://minio:9000"
      # Presigned URLs are consumed by host browsers, not Docker service DNS.
      MINIO_PUBLIC_ENDPOINT: "http://localhost:9000"
      MINIO_REGION: "${MINIO_REGION:-us-east-1}"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      VIRUS_SCAN_ENABLED: "true"
      VIRUS_SCAN_HOST: clamav
      VIRUS_SCAN_PORT: "3310"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD is required}
      CGCPMS_BOOTSTRAP_ENABLED: ${CGCPMS_BOOTSTRAP_ENABLED:-false}
      CGCPMS_BOOTSTRAP_TENANT_ID: ${CGCPMS_BOOTSTRAP_TENANT_ID:-0}
      CGCPMS_BOOTSTRAP_COMPANY_CODE: ${CGCPMS_BOOTSTRAP_COMPANY_CODE:-ROOT}
      CGCPMS_BOOTSTRAP_COMPANY_NAME: ${CGCPMS_BOOTSTRAP_COMPANY_NAME:-总公司}
      CGCPMS_BOOTSTRAP_DEPARTMENT_CODE: ${CGCPMS_BOOTSTRAP_DEPARTMENT_CODE:-ROOT_DEPT}
      CGCPMS_BOOTSTRAP_DEPARTMENT_NAME: ${CGCPMS_BOOTSTRAP_DEPARTMENT_NAME:-总部}
      CGCPMS_BOOTSTRAP_ADMIN_USERNAME: ${CGCPMS_BOOTSTRAP_ADMIN_USERNAME:-admin}
      CGCPMS_BOOTSTRAP_ADMIN_REAL_NAME: ${CGCPMS_BOOTSTRAP_ADMIN_REAL_NAME:-平台管理员}
      CGCPMS_BOOTSTRAP_ADMIN_EMAIL: ${CGCPMS_BOOTSTRAP_ADMIN_EMAIL:-}
      CGCPMS_BOOTSTRAP_ADMIN_PASSWORD: ${CGCPMS_BOOTSTRAP_ADMIN_PASSWORD:-}
      CGCPMS_DEV_LOGIN_USERNAME: ${CGCPMS_DEV_LOGIN_USERNAME:-admin}
    command: java -jar target/cgc-pms-backend.jar
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - cgc-pms-dev-net

  # ===========================================================================
  # Frontend — Vite dev server with HMR (bind mount source)
  # ===========================================================================
  frontend:
    image: node:22-alpine
    container_name: cgc-pms-frontend-dev
    restart: unless-stopped
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source code — edit on host, HMR updates browser instantly
      - ../frontend-admin:/app
      # Anonymous volume for Linux-native node_modules (avoids Windows binary conflicts)
      - /app/node_modules
      # Persist pnpm store so container recreation does not redownload every package
      - pnpm-store:/root/.local/share/pnpm/store
      # Persist Corepack's pnpm shim cache
      - corepack-cache:/root/.cache/node/corepack
    environment:
      # Tell Vite proxy to forward /api → backend container (not localhost)
      VITE_API_TARGET: "http://backend:8080"
    command: >
      sh /app/scripts/docker-dev-entrypoint.sh
    networks:
      - cgc-pms-dev-net

# ===========================================================================
# Networks
# ===========================================================================
networks:
  cgc-pms-dev-net:
    driver: bridge

# ===========================================================================
# Volumes
# ===========================================================================
volumes:
  mysql-dev-data:
  redis-dev-data:
  minio-dev-data:
  maven-repo:
  pnpm-store:
  corepack-cache:
