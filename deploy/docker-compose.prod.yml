# =============================================================================
# CGC-PMS Production Docker Compose
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in ALL values (including JWT_SECRET)
#   2. Generate SSL certificates (or use volume mount):
#        mkdir -p ssl
#        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#          -keyout ssl/server.key -out ssl/server.crt \
#          -subj "/CN=your-domain.com"
#   3. Start:  docker compose -f docker-compose.prod.yml up -d
#   4. Stop:   docker compose -f docker-compose.prod.yml down
# =============================================================================

services:
  # ===========================================================================
  # Preflight — fail fast if required variables are missing or still CHANGE-ME
  # This container exits 0 (success) only when ALL checks pass.
  # Other services depend on it so they won't start until preflight succeeds.
  # ===========================================================================
  preflight:
    image: busybox:1.36
    container_name: cgc-pms-preflight
    restart: "no"
    command:
      - sh
      - -c
      - |
        echo "=== CGC-PMS Production Preflight ==="
        fail() { echo "  [FAIL] $$1"; exit 1; }
        pass() { echo "  [PASS] $$1"; }
        check_not_empty() {
          eval "val=\"\$$$1\""
          if [ -z "$$val" ]; then fail "$1 is empty or not set"; else pass "$1 is set"; fi
        }
        check_not_change_me() {
          eval "val=\"\$$$1\""
          case "$$val" in *CHANGE-ME*|*change-me*) fail "$1 still contains CHANGE-ME placeholder";; *) pass "$1 value looks valid";; esac
        }
        check_length() {
          eval "val=\"\$$$1\""
          if [ "$${#val}" -lt "$2" ]; then fail "$1 is too short (<$$2 chars, got $${#val})"; else pass "$1 length OK ($${#val} chars)"; fi
        }
        check_file() {
          if [ -f "$$1" ] && [ -s "$$1" ]; then pass "File $$1 exists and non-empty";
          else fail "File $$1 missing or empty (SSL certificate required)"; fi
        }
        echo ""
        echo "--- Critical Secrets ---"
        check_not_empty   "JWT_SECRET"
        check_not_change_me "JWT_SECRET"
        check_length      "JWT_SECRET" 32
        check_not_empty   "MYSQL_ROOT_PASSWORD"
        check_not_change_me "MYSQL_ROOT_PASSWORD"
        check_not_empty   "MYSQL_PASSWORD"
        check_not_change_me "MYSQL_PASSWORD"
        check_not_empty   "REDIS_PASSWORD"
        check_not_change_me "REDIS_PASSWORD"
        check_not_empty   "MINIO_ROOT_USER"
        check_not_change_me "MINIO_ROOT_USER"
        check_not_empty   "MINIO_ROOT_PASSWORD"
        check_not_change_me "MINIO_ROOT_PASSWORD"
        check_not_empty   "JASYPT_ENCRYPTOR_PASSWORD"
        check_not_change_me "JASYPT_ENCRYPTOR_PASSWORD"
        echo ""
        echo "--- SSL Certificates ---"
        check_file "/etc/nginx/ssl/server.crt"
        check_file "/etc/nginx/ssl/server.key"
        echo ""
        echo "--- Image Tags (must be pinned, not 'latest') ---"
        check_not_empty "BACKEND_TAG"
        check_not_empty "FRONTEND_TAG"
        case "$$BACKEND_TAG" in latest) fail "BACKEND_TAG must not be 'latest'";; *) pass "BACKEND_TAG pinned to $$BACKEND_TAG";; esac
        case "$$FRONTEND_TAG" in latest) fail "FRONTEND_TAG must not be 'latest'";; *) pass "FRONTEND_TAG pinned to $$FRONTEND_TAG";; esac
        echo ""
        echo "=== Preflight PASSED ==="
        exit 0
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
      - JASYPT_ENCRYPTOR_PASSWORD=${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD must be set in .env}
      - BACKEND_TAG=${BACKEND_TAG:?BACKEND_TAG must be set (e.g. git SHA)}
      - FRONTEND_TAG=${FRONTEND_TAG:?FRONTEND_TAG must be set (e.g. git SHA)}
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - cgc-pms-net
  # ===========================================================================
  # MySQL 8.0 — database server
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: cgc-pms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cgc_pms}
      MYSQL_USER: ${MYSQL_USER:-cgc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    # NOTE: In production, MySQL listens on the internal Docker network only.
    # Uncomment the ports line below if host access is needed (e.g. for DBA tools).
    # ports:
    #   - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --require-secure-transport=ON
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cgc-pms-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # Redis 7 — cache + session store + token blacklist
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: cgc-pms-redis
    restart: unless-stopped
    # NOTE: In production, Redis listens on the internal Docker network only.
    # Uncomment the ports line below if host access is needed.
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cgc-pms-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================================================
  # MinIO — S3-compatible object storage
  # ===========================================================================
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: cgc-pms-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # NOTE: In production, MinIO is accessed through the backend proxy.
    # Uncomment the ports line below if direct host access is needed.
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cgc-pms-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # Backend — Spring Boot 3.3 Java 21 REST API (:8080)
  # ===========================================================================
  backend:
    image: ${REGISTRY_URL:-}cgc-pms-backend:${BACKEND_TAG:?BACKEND_TAG must be set}
    container_name: cgc-pms-backend
    restart: unless-stopped
    depends_on:
      preflight:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # ---- Spring profile ----
      SPRING_PROFILES_ACTIVE: prod
      # ---- Database (service names resolve via Docker network) ----
      # useSSL=true + requireSSL=true + verifyServerCertificate=true for production security.
      # MySQL 8.0 auto-generates self-signed certs; JDBC connector 8.0+ trusts them by default.
      # For external CA-signed MySQL, mount the CA cert as a truststore and set trustCertificateKeyStoreUrl.
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/cgc_pms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true&verifyServerCertificate=true&allowPublicKeyRetrieval=true"
      DB_USERNAME: ${MYSQL_USER:-cgc}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # ---- Redis ----
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # ---- MinIO ----
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # ---- JWT (MUST be set in .env for production) ----
      JWT_SECRET: ${JWT_SECRET}
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD}
      # ---- CORS ----
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost}
    # Backend port NOT exposed to host — only accessible via internal Docker network (frontend → backend proxy)
    # ports:
    #   - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cgc-pms-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # Frontend — Nginx serving Vue 3 SPA + reverse proxy to backend (:80/:443)
  # ===========================================================================
  frontend:
    image: ${REGISTRY_URL:-}cgc-pms-frontend:${FRONTEND_TAG:?FRONTEND_TAG must be set}
    container_name: cgc-pms-frontend
    restart: unless-stopped
    depends_on:
      preflight:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      BACKEND_URL: backend:8080
    volumes:
      # SSL certificates — place server.crt and server.key here before starting
      - ./ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cgc-pms-net
    deploy:
      resources:
        limits:
          memory: 128M

# ===========================================================================
# Networks
# ===========================================================================
networks:
  cgc-pms-net:
    driver: bridge

# ===========================================================================
# Volumes
# ===========================================================================
volumes:
  mysql-data:
  redis-data:
  minio-data:
