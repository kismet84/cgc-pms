# =============================================================================
# Prometheus monitoring configuration for CGC-PMS
# =============================================================================
# Usage:
#   docker compose -f docker-compose.monitoring.yml up -d
#   Or include in deploy/docker-compose.dev.yml
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: cgc-pms

scrape_configs:
  - job_name: 'cgc-pms-backend'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'backend'
          env: 'dev'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
