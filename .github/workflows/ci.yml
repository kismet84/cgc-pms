name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  BACKEND_JAR_ARTIFACT: backend-jar-${{ github.run_number }}-${{ github.sha }}
  BACKEND_COVERAGE_ARTIFACT: backend-coverage-${{ github.run_number }}-${{ github.sha }}
  FRONTEND_DIST_ARTIFACT: frontend-dist-${{ github.run_number }}-${{ github.sha }}
  FRONTEND_COVERAGE_ARTIFACT: frontend-coverage-${{ github.run_number }}-${{ github.sha }}
  SBOM_ARTIFACT: sbom-artifacts-${{ github.run_number }}-${{ github.sha }}

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Verify backend test order independence
        run: cd backend && ./mvnw -C -Ptest-order-independence test
        env:
          TEST_JWT_SECRET: ${{ secrets.CI_TEST_JWT_SECRET || 'test-only-ci-cgc-pms-jwt-secret-key-256bit-minimum-length' }}
      - name: Run backend tests with coverage
        run: cd backend && ./mvnw -C verify
        env:
          TEST_JWT_SECRET: ${{ secrets.CI_TEST_JWT_SECRET || 'test-only-ci-cgc-pms-jwt-secret-key-256bit-minimum-length' }}
      - name: Upload backend test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            backend/target/surefire-reports
            backend/target/failsafe-reports
          if-no-files-found: ignore
      - name: Upload backend jar
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BACKEND_JAR_ARTIFACT }}
          path: backend/target/cgc-pms-backend.jar
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BACKEND_COVERAGE_ARTIFACT }}
          path: backend/target/site/jacoco

  backend-dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Scan backend high and critical library vulnerabilities
        run: |
          docker run --rm -v "$PWD:/workspace" aquasec/trivy:0.65.0 \
            fs \
            --scanners vuln \
            --vuln-type library \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table \
            --timeout 10m \
            /workspace/backend

  backend-test-mysql:
    runs-on: ubuntu-latest
    env:
      CI_MYSQL_DATABASE: cgc_pms_test
      CI_MYSQL_USER: cgc_test
      CI_MYSQL_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD || format('ci-mysql-{0}', github.run_id) }}
      CI_MYSQL_ROOT_PASSWORD: ${{ secrets.CI_MYSQL_ROOT_PASSWORD || format('ci-root-{0}', github.run_id) }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.CI_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.CI_MYSQL_DATABASE }}
          MYSQL_USER: ${{ env.CI_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ env.CI_MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run MySQL Flyway smoke test
        run: cd backend && ./mvnw -C -Dtest=FlywayMySqlSmokeTest test -Dspring.profiles.active=test
        env:
          TEST_JWT_SECRET: ${{ secrets.CI_TEST_JWT_SECRET || 'test-only-ci-cgc-pms-jwt-secret-key-256bit-minimum-length' }}
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/${{ env.CI_MYSQL_DATABASE }}
          SPRING_DATASOURCE_USERNAME: ${{ env.CI_MYSQL_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.CI_MYSQL_PASSWORD }}
      - name: Upload MySQL smoke test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-mysql-test-reports-${{ github.run_number }}-${{ github.sha }}
          path: backend/target/surefire-reports
          if-no-files-found: ignore

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend-admin/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: Lint frontend
        shell: bash
        run: |
          cd frontend-admin
          mkdir -p .ci-artifacts
          pnpm install --frozen-lockfile
          set -o pipefail
          pnpm lint:check 2>&1 | tee .ci-artifacts/lint-check.txt
      - name: Upload frontend lint evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-lint-report-${{ github.run_number }}-${{ github.sha }}
          path: frontend-admin/.ci-artifacts/lint-check.txt
          if-no-files-found: ignore

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend-admin/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: TypeScript type check
        run: cd frontend-admin && pnpm install --frozen-lockfile && pnpm type-check

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend-admin/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: Install & Build
        run: cd frontend-admin && pnpm install --frozen-lockfile && pnpm build
      - name: Check frontend bundle size
        run: cd frontend-admin && pnpm check:bundle-size
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.FRONTEND_DIST_ARTIFACT }}
          path: frontend-admin/dist

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend-admin/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: Install & Test with coverage
        run: cd frontend-admin && pnpm install --frozen-lockfile && pnpm test:coverage
        env:
          COVERAGE_DIR: coverage-ci
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.FRONTEND_COVERAGE_ARTIFACT }}
          path: frontend-admin/coverage-ci

  frontend-dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend-admin/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: Audit frontend dependencies with official registry
        run: cd frontend-admin && pnpm install --frozen-lockfile && pnpm audit --audit-level high --registry=https://registry.npmjs.org

  supply-chain-security:
    runs-on: ubuntu-latest
    needs: [backend-test, backend-dependency-scan, frontend-build]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Set daily Trivy cache key
        run: echo "TRIVY_CACHE_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
      - name: Restore Trivy vulnerability databases
        uses: actions/cache@v6
        with:
          path: .trivy-cache
          key: trivy-java-db-${{ runner.os }}-${{ env.TRIVY_CACHE_DATE }}
          restore-keys: |
            trivy-java-db-${{ runner.os }}-
      - name: Download backend jar
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BACKEND_JAR_ARTIFACT }}
          path: artifacts/backend
      - name: Scan built backend jar
        run: |
          mkdir -p .trivy-cache
          docker run --rm \
            -v "$PWD/.trivy-cache:/root/.cache/trivy" \
            -v "$PWD/artifacts/backend:/workspace:ro" \
            aquasec/trivy:0.65.0 \
            rootfs \
            --scanners vuln \
            --pkg-types library \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table \
            --timeout 10m \
            /workspace
      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.FRONTEND_DIST_ARTIFACT }}
          path: artifacts/frontend-dist
      - name: Package frontend build artifact
        run: tar -C artifacts -czf artifacts/frontend-dist.tar.gz frontend-dist
      - name: Generate backend SBOM
        uses: anchore/sbom-action@v0
        with:
          file: artifacts/backend/cgc-pms-backend.jar
          format: spdx-json
          output-file: artifacts/backend/cgc-pms-backend.spdx.json
          upload-artifact: false
      - name: Generate frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          path: artifacts/frontend-dist
          format: spdx-json
          output-file: artifacts/frontend-dist.spdx.json
          upload-artifact: false
      - name: Generate backend provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: artifacts/backend/cgc-pms-backend.jar
      - name: Generate backend SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: artifacts/backend/cgc-pms-backend.jar
          sbom-path: artifacts/backend/cgc-pms-backend.spdx.json
      - name: Generate frontend provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: artifacts/frontend-dist.tar.gz
      - name: Generate frontend SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: artifacts/frontend-dist.tar.gz
          sbom-path: artifacts/frontend-dist.spdx.json
      - name: Upload generated SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SBOM_ARTIFACT }}
          path: |
            artifacts/backend/cgc-pms-backend.spdx.json
            artifacts/frontend-dist.spdx.json

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-test-mysql, frontend-build]
    timeout-minutes: 25
    env:
      CI_MYSQL_DATABASE: cgc_pms_test
      CI_MYSQL_USER: cgc_test
      CI_MYSQL_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD || format('ci-mysql-{0}', github.run_id) }}
      CI_MYSQL_ROOT_PASSWORD: ${{ secrets.CI_MYSQL_ROOT_PASSWORD || format('ci-root-{0}', github.run_id) }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.CI_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.CI_MYSQL_DATABASE }}
          MYSQL_USER: ${{ env.CI_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ env.CI_MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend-admin/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.FRONTEND_DIST_ARTIFACT }}
          path: frontend-admin/dist
      - name: Start MinIO
        run: |
          docker run -d --name cgc-pms-e2e-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=cgcpmsci \
            -e MINIO_ROOT_PASSWORD=cgcpmsci123456 \
            minio/minio:latest server /data --console-address ":9001"
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:9000/minio/health/live; then
              exit 0
            fi
            sleep 2
          done
          docker logs cgc-pms-e2e-minio
          exit 1
      - name: Start backend
        run: |
          cd backend
          nohup ./mvnw -C spring-boot:run -Dspring-boot.run.profiles=test,dev \
            -Dspring-boot.run.arguments="--spring.datasource.url=jdbc:mysql://localhost:3306/${{ env.CI_MYSQL_DATABASE }} --spring.datasource.username=${{ env.CI_MYSQL_USER }} --spring.datasource.password=${{ env.CI_MYSQL_PASSWORD }} --spring.redis.host=localhost --spring.redis.port=6379 --jwt.secret=${TEST_JWT_SECRET} --cors.allowed-origins=http://127.0.0.1:4173,http://localhost:4173 --minio.endpoint=http://localhost:9000 --minio.access-key=cgcpmsci --minio.secret-key=cgcpmsci123456 --minio.bucket=cgc-pms-e2e --auth.dev-login.enabled=true --auth.dev-login.default-username=demo_dev_super_admin" \
            > ../backend.log 2>&1 &
          backend_pid=$!
          cd ..
          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:8080/api/actuator/health | grep -q '"status":"UP"'; then
              exit 0
            fi
            if ! kill -0 "$backend_pid" 2>/dev/null; then
              cat backend.log
              exit 1
            fi
            sleep 2
          done
          cat backend.log
          exit 1
        env:
          TEST_JWT_SECRET: ${{ secrets.CI_TEST_JWT_SECRET || 'test-only-ci-cgc-pms-jwt-secret-key-256bit-minimum-length' }}
      - name: Install Playwright dependencies
        run: cd frontend-admin && pnpm install --frozen-lockfile && pnpm exec playwright install chromium
      - name: Run E2E tests
        run: cd frontend-admin && pnpm test:e2e:ui
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          PLAYWRIGHT_WEB_SERVER_COMMAND: pnpm preview --host 127.0.0.1 --port 4173
          PLAYWRIGHT_USE_DEV_LOGIN: 'true'
          PLAYWRIGHT_DEV_LOGIN_PATH: /api/auth/dev-login?redirect=/dashboard
      - name: Upload E2E failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-evidence-${{ github.run_number }}-${{ github.sha }}
          path: |
            frontend-admin/playwright-report
            frontend-admin/test-results
            backend.log
          if-no-files-found: ignore

  sql-safety-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run SQL injection safety scan
        shell: pwsh
        run: ./scripts/check-sql-safety.ps1

  build-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - backend-dependency-scan
      - backend-test-mysql
      - frontend-lint
      - type-check
      - frontend-build
      - frontend-test
      - frontend-dependency-audit
      - supply-chain-security
      - e2e
      - sql-safety-scan
    steps:
      - name: Write build summary
        run: |
          {
            echo "## CI Build Summary"
            echo ""
            echo "- Run number: ${{ github.run_number }}"
            echo "- Commit SHA: ${{ github.sha }}"
            echo "- Core gate jobs: frontend-lint, backend-dependency-scan, backend-test, backend-test-mysql, type-check, frontend-build, frontend-test, frontend-dependency-audit, e2e, sql-safety-scan, supply-chain-security"
            echo "- Artifacts: ${{ env.BACKEND_JAR_ARTIFACT }}, ${{ env.BACKEND_COVERAGE_ARTIFACT }}, ${{ env.FRONTEND_DIST_ARTIFACT }}, ${{ env.FRONTEND_COVERAGE_ARTIFACT }}, ${{ env.SBOM_ARTIFACT }}"
            echo ""
            echo "### Job Results"
            echo "- backend-test: ${{ needs.backend-test.result }}"
            echo "- backend-dependency-scan: ${{ needs.backend-dependency-scan.result }}"
            echo "- backend-test-mysql: ${{ needs.backend-test-mysql.result }}"
            echo "- frontend-lint: ${{ needs.frontend-lint.result }}"
            echo "- type-check: ${{ needs.type-check.result }}"
            echo "- frontend-build: ${{ needs.frontend-build.result }}"
            echo "- frontend-test: ${{ needs.frontend-test.result }}"
            echo "- frontend-dependency-audit: ${{ needs.frontend-dependency-audit.result }}"
            echo "- supply-chain-security: ${{ needs.supply-chain-security.result }}"
            echo "- e2e: ${{ needs.e2e.result }}"
            echo "- sql-safety-scan: ${{ needs.sql-safety-scan.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
