name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Tests (Java 21 + H2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        env:
          JASYPT_ENCRYPTOR_PASSWORD: dev-jasypt-key
          SPRING_PROFILES_ACTIVE: local
        run: ./mvnw clean test -B

  frontend-build:
    name: Frontend Type Check + Build (pnpm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@11

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend-admin/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: frontend-admin
        run: pnpm install --frozen-lockfile

      - name: Type check + Build (vue-tsc --noEmit && vite build)
        working-directory: frontend-admin
        run: pnpm build

      - name: Run Vitest unit tests
        working-directory: frontend-admin
        run: pnpm test:unit

  flyway-check:
    name: Flyway Migration Check
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Flyway migration check (startup triggers auto-migration)
        working-directory: backend
        env:
          JASYPT_ENCRYPTOR_PASSWORD: dev-jasypt-key
          SPRING_PROFILES_ACTIVE: local
        run: |
          echo "Starting Spring Boot to trigger Flyway migrations..."
          timeout 60 ./mvnw spring-boot:run -B > /tmp/app.log 2>&1 &
          APP_PID=$!
          # Wait for Flyway migrations to complete and app to start
          PASSED=false
          for i in $(seq 1 25); do
            if grep -q "Started CgcPmsBackendApplication\|Started .*Application" /tmp/app.log 2>/dev/null; then
              echo "✅ Flyway migrations applied successfully — app started"
              PASSED=true
              break
            fi
            if grep -qiE "Flyway.*(failed|error|exception)|Caused by.*FlywayException|Migration.*failed" /tmp/app.log 2>/dev/null; then
              echo "❌ Flyway migration failed"
              cat /tmp/app.log
              kill $APP_PID 2>/dev/null
              exit 1
            fi
            sleep 2
          done
          kill $APP_PID 2>/dev/null
          if [ "$PASSED" = true ]; then
            exit 0
          else
            echo "❌ Flyway check timed out"
            cat /tmp/app.log
            exit 1
          fi

  docker-build:
    name: Docker Build (Backend + Frontend)
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          load: true
          tags: cgc-pms-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: frontend-admin
          push: false
          load: true
          tags: cgc-pms-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: [backend-test, frontend-build, flyway-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/cgc-pms-backend:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/cgc-pms-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend-admin
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/cgc-pms-frontend:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/cgc-pms-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Pre-deploy secrets validation
            check_var() {
              val=$(eval echo "\$$1" 2>/dev/null || echo "")
              if [ -z "$val" ]; then
                echo "ERROR: Required secret $1 is not set"
                exit 1
              fi
              echo "  $1: OK (length=${#val})"
            }
            echo "Validating deploy secrets..."
            check_var REGISTRY_URL
            check_var REGISTRY_USERNAME
            check_var REGISTRY_PASSWORD
            check_var SSH_HOST
            check_var SSH_USER
            echo "Secrets validation passed"
            # Pull SHA-pinned images for immutable deployment
            docker pull ${{ secrets.REGISTRY_URL }}/cgc-pms-backend:${{ github.sha }}
            docker pull ${{ secrets.REGISTRY_URL }}/cgc-pms-frontend:${{ github.sha }}
            # Tag images for compose reference (compose uses BACKEND_TAG/FRONTEND_TAG env vars)
            docker tag ${{ secrets.REGISTRY_URL }}/cgc-pms-backend:${{ github.sha }} cgc-pms-backend:${{ github.sha }}
            docker tag ${{ secrets.REGISTRY_URL }}/cgc-pms-frontend:${{ github.sha }} cgc-pms-frontend:${{ github.sha }}
            # Export tags for compose variable substitution (required by preflight)
            export BACKEND_TAG=${{ github.sha }}
            export FRONTEND_TAG=${{ github.sha }}
            cd /opt/cgc-pms && docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # Post-deploy readiness check: verify Spring Boot actuator JSON status=UP via HTTPS
            echo "Waiting for services to stabilize (checking actuator health JSON)..."
            HEALTH_OK=false
            for i in $(seq 1 12); do
              sleep 5
              HEALTH=$(curl -sS http://localhost/api/actuator/health 2>/dev/null)
              if echo "$HEALTH" | grep -q '"status":"UP"'; then
                echo "✅ Readiness check passed ($((i*5))s): $HEALTH"
                echo "Deployed SHA: ${{ github.sha }}"
                echo "Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                HEALTH_OK=true
                break
              fi
              echo "Attempt $i/12: not ready yet"
            done
            if [ "$HEALTH_OK" = false ]; then
              echo "❌ Readiness check failed after 60s"
              exit 1
            fi
            # Rollback path (documented):
            #   export BACKEND_TAG=<previous-sha> FRONTEND_TAG=<previous-sha>
            #   docker compose -f docker-compose.prod.yml up -d --remove-orphans
