name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run backend tests with coverage
        run: cd backend && ./mvnw verify -Djasypt.encryptor.password=dev-jasypt-key
        env:
          JASYPT_ENCRYPTOR_PASSWORD: dev-jasypt-key
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco

  backend-test-mysql:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cgc_pms_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run MySQL integration tests
        run: cd backend && ./mvnw test -Dspring.profiles.active=test -Djasypt.encryptor.password=dev-jasypt-key
        env:
          JASYPT_ENCRYPTOR_PASSWORD: dev-jasypt-key
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/cgc_pms_test
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: TypeScript type check
        run: cd frontend-admin && pnpm install --frozen-lockfile && pnpm type-check

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: Install & Build
        run: cd frontend-admin && pnpm install --frozen-lockfile && pnpm build

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend-admin/pnpm-lock.yaml
      - name: Install & Test with coverage
        run: cd frontend-admin && pnpm install --frozen-lockfile && pnpm test:coverage || true
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-admin/coverage
